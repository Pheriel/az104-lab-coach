services:
  postgres:
    image: postgres:16-alpine
    container_name: az104-lab-coach-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: az104_lab_coach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - az104_lab_coach_pgdata:/var/lib/postgresql/data

volumes:
  az104_lab_coach_pgdata:
